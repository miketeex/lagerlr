<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagerleiðrétting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --primary: #78A22F;
    --primary-hover: #689326;
    --primary-light: #A6CF54;

    --bg: #F6F8FA;
    --surface: #FFFFFF;
    --card: #FFFFFF;
    --hover: #F2F5F7;
    --border: #E3E8EE;
    --text-primary: #1D232A;
    --text-secondary: #5C6675;
    --text-muted: #8D96A4;

    --radius-card: 16px;
    --radius-btn: 12px;
    --shadow-sm: 0 2px 6px rgba(0,0,0,.08);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181B1F;
      --surface: #20242A;
      --card: #262B31;
      --hover: #2F353D;
      --border: #343B44;
      --text-primary: #F5F7FA;
      --text-secondary: #B0B8C4;
      --text-muted: #7E8794;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text-primary); font-size: 15px; line-height: 1.5; }
  [data-lucide] { width: 16px; height: 16px; stroke-width: 1.8; flex-shrink: 0; vertical-align: -3px; }

  body.embedded .page-header { display: none; }

  .page-header { display: flex; align-items: center; gap: 12px; padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .page-header img { height: 28px; }
  .page-header .titles { line-height: 1.25; }
  .page-header .kicker { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
  .page-header .title { font-size: 18px; font-weight: 700; }

  .container { max-width: 620px; margin: 0 auto; padding: 32px 20px 64px; }

  .notify { padding: 12px 18px; border-radius: var(--radius-btn); margin-bottom: 16px; font-size: 14px; display: none; }
  .notify.success { background: rgba(56,178,74,0.12); color: #2b8a3e; border: 1px solid rgba(56,178,74,0.3); display: block; }
  .notify.error { background: rgba(224,83,83,0.12); color: #c0392b; border: 1px solid rgba(224,83,83,0.3); display: block; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 32px; }
  .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 22px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
  .field input, .field select, .field textarea {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-btn);
    font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text-primary);
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); outline: none; }
  .field textarea { resize: vertical; min-height: 100px; }
  .field .vara-desc { font-size: 12px; color: var(--text-muted); margin-top: 6px; min-height: 16px; }

  .autocomplete-wrapper { position: relative; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius-btn) var(--radius-btn);
    max-height: 220px; overflow-y: auto; z-index: 100; display: none;
    box-shadow: var(--shadow-sm);
  }
  .autocomplete-list.active { display: block; }
  .autocomplete-item { padding: 9px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: var(--hover); }
  .autocomplete-item span { color: var(--text-muted); font-size: 11px; margin-left: 8px; }
  .autocomplete-item.eol { opacity: 0.55; font-style: italic; }

  .store-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px; }
  .store-btn {
    padding: 14px 8px; border: 1px solid var(--border); border-radius: var(--radius-btn);
    background: var(--card); color: var(--text-primary); font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .store-btn [data-lucide] { color: var(--primary); }
  .store-btn.active, .store-btn:hover { border-color: var(--primary); background: rgba(120,162,47,0.06); }

  .btn { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: var(--radius-btn); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%; margin-top: 8px; }
  .btn:hover { background: var(--primary-hover); }

  .form-section { display: none; }
  .form-section.active { display: block; }

  .store-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 18px; display: flex; align-items: center; gap: 6px; }
  .store-label strong { color: var(--text-primary); }
  .store-label a { color: var(--primary); font-size: 12px; margin-left: 6px; text-decoration: underline; }
</style>
</head>
<body>

<div class="page-header">
  <img src="images/ELKO_logo_SVG.svg" alt="ELKO">
  <div class="titles">
    <div class="kicker">Lager</div>
    <div class="title">Lagerleiðrétting</div>
  </div>
</div>

<div class="container">

  <div id="notify" class="notify"></div>

  <div id="storeSection">
    <div class="card">
      <h2>Veldu verslun</h2>
      <div class="store-grid">
        <button class="store-btn" onclick="selectStore('ELKO Lindir', this)"><i data-lucide="store"></i>ELKO Lindir</button>
        <button class="store-btn" onclick="selectStore('ELKO Smáralind', this)"><i data-lucide="store"></i>ELKO Smáralind</button>
        <button class="store-btn" onclick="selectStore('ELKO Skeifan', this)"><i data-lucide="store"></i>ELKO Skeifan</button>
        <button class="store-btn" onclick="selectStore('ELKO Grandi', this)"><i data-lucide="store"></i>ELKO Grandi</button>
        <button class="store-btn" onclick="selectStore('ELKO Akureyri', this)"><i data-lucide="store"></i>ELKO Akureyri</button>
        <button class="store-btn" onclick="selectStore('ELKO Flugstöð', this)"><i data-lucide="store"></i>ELKO Flugstöð</button>
      </div>
    </div>
  </div>

  <div id="formSection" class="form-section">
    <div class="card">
      <p class="store-label">Verslun: <strong id="selectedStoreLabel"></strong><a href="#" onclick="changeStore()">Breyta</a></p>
      <h2>Tilkynna frávik</h2>

      <div class="field">
        <label>Vörunúmer *</label>
        <div class="autocomplete-wrapper">
          <input type="text" id="vorunumer" placeholder="Sláðu inn vörunúmer..." autocomplete="off" oninput="searchProducts(this.value)">
          <div class="autocomplete-list" id="autocompleteList"></div>
        </div>
        <div class="vara-desc" id="varaDesc"></div>
      </div>

      <div class="field">
        <label>Ástæða *</label>
        <select id="astæda">
          <option value="">-- Veldu ástæðu --</option>
          <option value="Gallað">Gallað</option>
          <option value="Ósöluhæft">Ósöluhæft</option>
          <option value="Þjófnaður">Þjófnaður</option>
          <option value="Lagerleiðrétting">Lagerleiðrétting</option>
        </select>
      </div>

      <div class="field">
        <label>Nánari lýsing *</label>
        <textarea id="lysing" placeholder="Útskýrðu hvað málið er og af hverju þú ert að setja inn þessa tilkynningu..."></textarea>
      </div>

      <div class="field">
        <label>Hver tilkynnir *</label>
        <input type="text" id="tilkynnir" placeholder="Sölustafir">
      </div>

      <button class="btn" onclick="submitReport()">Senda tilkynningu</button>
    </div>
  </div>

</div>

<script>
  if (new URLSearchParams(window.location.search).get('embedded') === 'true') {
    document.body.classList.add('embedded');
  }
  if (window.lucide) lucide.createIcons();

  const PROXY = 'https://lagerlr-proxy.pruins.workers.dev/api';
  const FLOW_VORULIST = PROXY + '/vorulisti';
  const FLOW_SUBMIT = PROXY + '/senda-tilkynningu';

  let selectedStore = '';
  let selectedVara = '';
  let selectedVorunumer = '';
  let searchTimeout = null;

  function notify(msg, type) {
    const el = document.getElementById('notify');
    el.textContent = msg;
    el.className = 'notify ' + type;
    setTimeout(() => el.className = 'notify', 4000);
  }

  function selectStore(store, btn) {
    selectedStore = store;
    document.getElementById('selectedStoreLabel').textContent = store;
    document.getElementById('storeSection').style.display = 'none';
    document.getElementById('formSection').classList.add('active');
  }

  function changeStore() {
    selectedStore = '';
    document.getElementById('storeSection').style.display = 'block';
    document.getElementById('formSection').classList.remove('active');
  }

  function searchProducts(query) {
    clearTimeout(searchTimeout);
    selectedVara = '';
    selectedVorunumer = '';
    document.getElementById('varaDesc').textContent = '';

    if (query.length < 2) {
      document.getElementById('autocompleteList').classList.remove('active');
      return;
    }

    searchTimeout = setTimeout(async () => {
      try {
        const res = await fetch(FLOW_VORULIST, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ Query: query.trim().split(/\s+/)[0] })
        });
        const data = await res.json();
        const raw = data.value || data;
        const words = query.toLowerCase().trim().split(/\s+/);
        const seen = new Set();
        const items = raw.filter(i => {
          if (seen.has(i.Title)) return false;
          seen.add(i.Title);
          const searchText = ((i.Title || '') + ' ' + (i.Vara || '')).toLowerCase();
          return words.every(w => searchText.includes(w));
        }).slice(0, 20);
        renderAutocomplete(items);
      } catch(e) {
        console.error(e);
      }
    }, 300);
  }

  function renderAutocomplete(items) {
    const list = document.getElementById('autocompleteList');
    if (!items.length) {
      list.classList.remove('active');
      return;
    }

    items.sort((a, b) => {
      const aEol = (a.Vara || '').includes('#');
      const bEol = (b.Vara || '').includes('#');
      if (aEol && !bEol) return 1;
      if (!aEol && bEol) return -1;
      return 0;
    });

    list.innerHTML = items.map((item, idx) => {
      const isEol = (item.Vara || '').includes('#');
      return `<div class="autocomplete-item${isEol ? ' eol' : ''}" data-idx="${idx}">
        ${item.Title} <span>${item.Vara || ''}${isEol ? ' ⚠️' : ''}</span>
      </div>`;
    }).join('');

    window._autocompleteItems = items;

    list.querySelectorAll('.autocomplete-item').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const idx = parseInt(el.dataset.idx);
        const item = window._autocompleteItems[idx];
        selectProduct(item.Title, item.Vara || '');
      });
    });

    list.classList.add('active');
  }

  function selectProduct(vorunumer, vara) {
    selectedVorunumer = vorunumer;
    selectedVara = vara;
    document.getElementById('vorunumer').value = vorunumer;
    document.getElementById('varaDesc').textContent = vara;
    document.getElementById('autocompleteList').classList.remove('active');
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.autocomplete-wrapper')) {
      document.getElementById('autocompleteList').classList.remove('active');
    }
  });

  async function submitReport() {
    const astæda = document.getElementById('astæda').value;
    const lysing = document.getElementById('lysing').value.trim();
    const tilkynnir = document.getElementById('tilkynnir').value.trim();

    if (!selectedVorunumer) { notify('Veldu vöru úr listanum.', 'error'); return; }
    if (!astæda) { notify('Veldu ástæðu.', 'error'); return; }
    if (!lysing) { notify('Skrifaðu nánari lýsingu.', 'error'); return; }
    if (!tilkynnir) { notify('Skráðu nafn tilkynnanda.', 'error'); return; }

    try {
      await fetch(FLOW_SUBMIT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          Verslun: selectedStore,
          Vorunumer: selectedVorunumer,
          Vara: selectedVara,
          Astæda: astæda,
          Lysing: lysing,
          Tilkynnir: tilkynnir
        })
      });

      notify('Tilkynning send!', 'success');
      document.getElementById('vorunumer').value = '';
      document.getElementById('varaDesc').textContent = '';
      document.getElementById('astæda').value = '';
      document.getElementById('lysing').value = '';
      document.getElementById('tilkynnir').value = '';
      selectedVorunumer = '';
      selectedVara = '';
    } catch(e) {
      notify('Villa við að senda tilkynningu. Reyndu aftur.', 'error');
      console.error(e);
    }
  }
</script>

</body>
</html>
